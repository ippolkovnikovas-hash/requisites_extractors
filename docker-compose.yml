services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: requisites_extractor_app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./exports:/app/exports
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped